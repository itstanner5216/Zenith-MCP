packages:
  - "packages/*"
allowBuilds:
  tree-sitter-cli: true

minimumReleaseAge: 0

# Security overrides for transitive deps flagged by Dependabot (not reachable in
# Zenith's own code — no CORS/Lambda/cookies; HTTP is Express + bearer auth — but
# pinned to patched versions to clear the alerts).
#   hono <4.12.25: CORS-credentials origin reflection (high), Lambda@Edge repeated
#     request-header drop, Lambda Set-Cookie merge, body-limit bypass, serve-static %5C.
#   vite 8.0.0–8.0.15: server.fs.deny bypass (high), launch-editor NTLMv2 disclosure.
overrides:
  hono: ">=4.12.25"
  vite: ">=8.0.16"

patchedDependencies:
  "@modelcontextprotocol/sdk@1.29.0": packages/zenith-mcp/patches/@modelcontextprotocol__sdk@1.29.0.patch
