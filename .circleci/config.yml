# CircleCI configuration for Zenith-MCP.
#
# This pipeline runs alongside the GitHub Actions CI (.github/workflows/ci.yml).
# The test/build jobs run on every branch and pull request (so you get CircleCI
# Test Insights + stored artifacts on PRs), which does duplicate the GitHub
# Actions PR gate — that overlap is accepted intentionally. The `deploy` job is
# gated to version tags only, so publishing never happens on a PR.
#
# CircleCI-specific value this adds on top of GitHub Actions:
#   - Test Insights   (via `store_test_results` + JUnit output)
#   - Build artifacts (stored per-package in the CircleCI UI)
#   - Deploy Markers  (the `deploy` job below, run on `v*` tags)
#
# Stacks detected: cicd:github-actions:.github/workflows,deps:node:.
version: 2.1
orbs:
  node: circleci/node@5
jobs:
  test-node:
    # Build, then run the test suite with coverage and JUnit output so CircleCI
    # can surface Test Insights (flaky-test detection, timing trends).
    executor:
      name: node/default
      tag: "26.3.0"
    steps:
      - checkout
      - run:
          name: Enable pnpm (Corepack)
          command: |
            corepack enable
            corepack prepare pnpm@11.9.0 --activate
      - node/install-packages:
          cache-path: ~/project/node_modules
          override-ci-command: pnpm install --frozen-lockfile
      - run:
          # Tests import from packages/zenith-mcp/dist, so build must run first.
          name: Build & run tests (coverage + JUnit for Test Insights)
          command: |
            pnpm build
            pnpm --dir packages/zenith-mcp exec vitest run \
              --coverage \
              --reporter=default \
              --reporter=junit \
              --outputFile.junit=./test-results/junit.xml
      - store_test_results:
          path: packages/zenith-mcp/test-results
      - store_artifacts:
          path: packages/zenith-mcp/coverage
          destination: coverage
  build-node:
    # Build the workspace and store each package's dist output as an artifact.
    executor:
      name: node/default
      tag: "26.3.0"
    steps:
      - checkout
      - run:
          name: Enable pnpm (Corepack)
          command: |
            corepack enable
            corepack prepare pnpm@11.9.0 --activate
      - node/install-packages:
          cache-path: ~/project/node_modules
          override-ci-command: pnpm install --frozen-lockfile
      - run:
          name: Build
          command: pnpm build
      - run:
          # Copy each package's dist into its own subdirectory so the shared
          # `dist` basename does not collide. No error suppression: a missing
          # dist means the build failed and the job should fail loudly.
          name: Collect build artifacts
          command: |
            mkdir -p ~/artifacts/zenith-mcp ~/artifacts/zenith-toon
            cp -R packages/zenith-mcp/dist ~/artifacts/zenith-mcp/
            cp -R packages/zenith-toon/dist ~/artifacts/zenith-toon/
      - store_artifacts:
          path: ~/artifacts
          destination: node-build
  deploy:
    # Publishes the workspace packages (zenith-toon, zenith-mcp) to npm and
    # wraps the publish in CircleCI Deploy Markers so the release shows up in
    # the CircleCI UI. Runs on version tags (v*) only — never on a PR.
    #
    # Requires an NPM_TOKEN environment variable configured in the CircleCI
    # project settings (Project Settings > Environment Variables) with publish
    # rights to the zenith-mcp and zenith-toon packages.
    executor:
      name: node/default
      tag: "26.3.0"
    steps:
      - checkout
      - run:
          name: Enable pnpm (Corepack)
          command: |
            corepack enable
            corepack prepare pnpm@11.9.0 --activate
      - node/install-packages:
          cache-path: ~/project/node_modules
          override-ci-command: pnpm install --frozen-lockfile
      - run:
          name: Build
          command: pnpm build
      - run:
          name: Install CircleCI CLI (for Deploy Markers)
          command: curl -fLSs https://raw.githubusercontent.com/CircleCI-Public/circleci-cli/main/install.sh | sudo bash
      - run:
          name: Plan deployment
          command: |
            circleci run release plan deploy \
              --environment-name="production" \
              --component-name="${CIRCLE_PROJECT_REPONAME}" \
              --target-version="${CIRCLE_TAG:-1.0.${CIRCLE_BUILD_NUM}-${CIRCLE_SHA1:0:7}}"
      - run:
          name: Update deployment status to running
          command: circleci run release update deploy --status=RUNNING
      - run:
          # Publish every non-private workspace package to npm. --no-git-checks
          # skips pnpm's clean-working-tree requirement (CI checkout is detached).
          name: Publish packages to npm
          command: |
            echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
            pnpm -r publish --access public --no-git-checks
      - run:
          name: Update deployment status to success
          command: circleci run release update deploy --status=SUCCESS
          when: on_success
      - run:
          name: Update deployment status to failed
          command: circleci run release update deploy --status=FAILED
          when: on_fail
workflows:
  build-and-test:
    jobs:
      # Runs on every branch/PR and on version tags.
      - test-node:
          filters:
            tags:
              only: /^v.*/
      - build-node:
          requires:
            - test-node
          filters:
            tags:
              only: /^v.*/
      # Deploys on version tags only (v1.2.3, ...). Never runs on a PR.
      - deploy:
          requires:
            - build-node
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
