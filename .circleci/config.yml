version: 2.1
orbs:
  node: circleci/node@5
jobs:
  test-node:
    # Install node dependencies and run tests
    executor:
      name: node/default
      tag: "26.3.0"
    steps:
      - checkout
      - run:
          name: Enable pnpm (Corepack)
          command: |
            corepack enable
            corepack prepare pnpm@11.9.0 --activate
      - node/install-packages:
          cache-path: ~/project/node_modules
          override-ci-command: pnpm install --frozen-lockfile
      - run:
          name: Build & run tests (with coverage)
          command: |
            pnpm build
            pnpm --filter zenith-mcp run test:coverage
            pnpm --filter zenith-toon run test
  build-node:
    # Build node project
    executor:
      name: node/default
      tag: "26.3.0"
    steps:
      - checkout
      - run:
          name: Enable pnpm (Corepack)
          command: |
            corepack enable
            corepack prepare pnpm@11.9.0 --activate
      - node/install-packages:
          cache-path: ~/project/node_modules
          override-ci-command: pnpm install --frozen-lockfile
      - run:
          command: pnpm build
      - run:
          name: Create the ~/artifacts directory if it doesn't exist
          command: mkdir -p ~/artifacts
      # Copy output to artifacts dir
      - run:
          name: Copy artifacts
          command: |
            cp -R packages/zenith-mcp/dist packages/zenith-toon/dist ~/artifacts
      - store_artifacts:
          path: ~/artifacts
          destination: node-build
  deploy:
    # This is an example deploy job, not actually used by the workflow
    docker:
      - image: circleci/circleci-cli:latest
    steps:
      - checkout
      - run:
          name: Plan deployment
          command: |
            circleci run release plan deploy \
              --environment-name="default" \
              --component-name="${CIRCLE_PROJECT_REPONAME}" \
              --target-version="1.0.${CIRCLE_BUILD_NUM}-${CIRCLE_SHA1:0:7}"
      # Replace this with steps to deploy to users
      - run:
          name: deploy
          command: '#e.g. ./deploy.sh'
      - run:
          name: Update deployment status to running
          command: circleci run release update deploy --status=RUNNING
      # (removed auto-generated no-op step)
      - run:
          name: Update deployment status to success
          command: circleci run release update deploy --status=SUCCESS
          when: on_success
      - run:
          name: Update deployment status to failed
          command: circleci run release update deploy --status=FAILED
          when: on_fail
workflows:
  build-and-test:
    jobs:
      - test-node
      - build-node:
          requires:
            - test-node
    # - deploy:
    #     requires:
    #       - build-node
