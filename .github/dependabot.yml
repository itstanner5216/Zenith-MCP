version: 2
updates:

  # ── GitHub Actions ─────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "UTC"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - "*"

  # ── npm (root + every workspace, consolidated) ──────────────────────────────
  # `directories` covers every npm manifest (root + workspaces). Combined with
  # the groups below, Dependabot merges all workspace bumps into ONE PR per
  # group across all directories instead of one PR per package × group.
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/packages/zenith-mcp"
      - "/packages/zenith-toon"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "05:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"

    # @modelcontextprotocol/sdk is pinned with a pnpm patch in pnpm-workspace.yaml
    # (patchedDependencies: "@modelcontextprotocol/sdk@1.29.0"). Bumping it here
    # would break `pnpm install` — upgrade manually and refresh the patch.
    ignore:
      - dependency-name: "@modelcontextprotocol/sdk"

    groups:
      # All @types/* dev stubs in one PR
      type-stubs:
        applies-to: version-updates
        patterns:
          - "@types/*"
        dependency-type: "development"

      # MCP SDK alpha releases
      mcp-sdk:
        applies-to: version-updates
        patterns:
          - "@modelcontextprotocol/server"
          - "@modelcontextprotocol/client"

      # Tree-sitter runtime + CLI + WASM grammars
      tree-sitter:
        applies-to: version-updates
        patterns:
          - "web-tree-sitter"
          - "tree-sitter-cli"
          - "tree-sitter-*"
          - "@repomix/tree-sitter-wasms"

      # Zod schema ecosystem
      zod:
        applies-to: version-updates
        patterns:
          - "zod"
          - "zod-*"

      # Vitest testing stack
      testing:
        applies-to: version-updates
        patterns:
          - "vitest"
          - "@vitest/*"
        dependency-type: "development"

      # Build tooling (turbo, typescript, etc.)
      build-tooling:
        applies-to: version-updates
        patterns:
          - "turbo"
          - "typescript"
          - "tsx"
          - "tsup"

      # Everything else in one catch-all PR
      all-other-deps:
        applies-to: version-updates
        patterns:
          - "*"
